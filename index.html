<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Project  Test</title>
</head>
<body>
<div class="d-flex justify-content-center align-items-center vh-100">
    <div class="pass-container">
  <div class="pass-card">
    <div class="pass-title">
      <span class="pass-text">Password</span>
    </div>
    <div class="pass-form">
      <!-- <div class="input-group">
        <input required="" placeholder="Password" class="pass-input" type="text" />
      </div> -->
      <div class="otp-group">
        <input class="otp-input" type="text" maxlength="1" inputmode="numeric" />
        <input class="otp-input" type="text" maxlength="1" inputmode="numeric" />
        <input class="otp-input" type="text" maxlength="1" inputmode="numeric" />
        <input class="otp-input" type="text" maxlength="1" inputmode="numeric" />
        <input class="otp-input" type="text" maxlength="1" inputmode="numeric" />
        <input class="otp-input" type="text" maxlength="1" inputmode="numeric" />
      </div>
      <button class="pass-btn" type="submit">ENTER Password</button>
    </div>
  </div>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script>
  const inputs = document.querySelectorAll('.otp-input');
  const btn = document.querySelector('.pass-btn');
  const CORRECT_PASSWORD = '123456';

  inputs.forEach((input, i) => {
    input.addEventListener('input', () => {
      input.value = input.value.replace(/[^0-9]/g, '');
      if (input.value && i < inputs.length - 1) inputs[i + 1].focus();
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !input.value && i > 0) inputs[i - 1].focus();
    });
    input.addEventListener('paste', (e) => {
      e.preventDefault();
      const pasted = e.clipboardData.getData('text').slice(0, inputs.length);
      [...pasted].forEach((char, j) => { if (inputs[i + j]) inputs[i + j].value = char; });
      inputs[Math.min(i + pasted.length, inputs.length - 1)].focus();
    });
  });

 btn.addEventListener('click', () => {
  const entered = [...inputs].map(i => i.value).join('');
  if (entered.length < inputs.length) { shakeCard(); return; }

  // แสดง loading ใน iframe เต็มจอ
  const loadingOverlay = document.createElement('div');
  loadingOverlay.style.cssText = `
    position:fixed; inset:0; z-index:9998;
    width:100vw; height:100vh;
  `;

  const iframe = document.createElement('iframe');
  iframe.src = 'loading.html'; // path ไปยังไฟล์ loading
  iframe.style.cssText = `
    width:100%; height:100%; border:none; display:block;
  `;

  loadingOverlay.appendChild(iframe);
  document.body.appendChild(loadingOverlay);

  // หลัง 5 วินาที ลบ loading แล้วเริ่ม animation
  setTimeout(() => {
    loadingOverlay.remove();
    entered === CORRECT_PASSWORD ? launchAnimation('success') : launchAnimation('fail');
  }, 5000);
});

  function shakeCard() {
    const card = document.querySelector('.pass-card');
    card.style.animation = 'shake 0.4s ease';
    setTimeout(() => card.style.animation = '', 400);
  }

  // ── Animation ──────────────────────────────────────────────
  let canvas, ctx, animId, t, mode, phase, done;
  let shipX, shipY, shipAngle, shipVY, scrollY, heat, parachuteOpen, wobble;
  let explosionR, explosionProg, particles, stars, W, H;

  function launchAnimation(m) {
    const existing = document.getElementById('anim-overlay');
    if (existing) existing.remove();
    cancelAnimationFrame(animId);

 const overlay = document.createElement('div');
overlay.id = 'anim-overlay';
overlay.style.cssText = `
  position:fixed; inset:0; width:100vw; height:100vh;
  background:#050a1a; z-index:9999;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  font-family:monospace;
`;

    const hud = document.createElement('div');
    hud.id = 'anim-hud';
    hud.style.cssText = 'color:#888780; font-size:12px; letter-spacing:1px; margin-bottom:12px; min-height:18px;';
    hud.textContent = '— INITIALIZING —';

   canvas = document.createElement('canvas');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight - 80;
    canvas.style.cssText = 'display:block; width:100%; height:auto;';

    const closeBtn = document.createElement('button');
    closeBtn.textContent = 'CLOSE';
    closeBtn.style.cssText = `
      margin-top:16px; padding:8px 24px; background:transparent;
      border:1px solid #5F5E5A; color:#888780; border-radius:6px;
      font-size:12px; letter-spacing:1px; cursor:pointer;
    `;
    closeBtn.onclick = () => {
      cancelAnimationFrame(animId);
      overlay.remove();
      inputs.forEach(i => { i.value = ''; i.disabled = false; });
      btn.textContent = 'ENTER PASSWORD';
      btn.style.background = '#000';
      inputs[0].focus();
    };

    overlay.appendChild(hud);
    overlay.appendChild(canvas);
    overlay.appendChild(closeBtn);
    document.body.appendChild(overlay);

    ctx = canvas.getContext('2d');
    W = canvas.width; H = canvas.height;
    mode = m; t = 0; phase = 0; done = false;
    particles = []; stars = [];
    shipX = W / 2; shipY = 55;
    shipAngle = 0.15; shipVY = 0.4;
    scrollY = 0; heat = 0;
    parachuteOpen = 0; explosionR = 0; explosionProg = 0; wobble = 0;

    stars = Array.from({length: 160}, () => ({
      x: Math.random() * W, y: Math.random() * H * 0.75,
      r: Math.random() * 1.3 + 0.2,
      a: Math.random() * 0.5 + 0.3,
      tw: Math.random() * Math.PI * 2
    }));

    inputs.forEach(i => i.disabled = true);
    btn.textContent = mode === 'success' ? 'ACCESS GRANTED ✓' : 'WRONG PASSWORD';
    btn.style.background = mode === 'success' ? '#0F6E56' : '#A32D2D';

    loop();
  }

  function spawnP(x, y, opts = {}) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * (opts.spread || 3),
      vy: (Math.random() * (opts.vy || 3) + (opts.vyBase || 0)),
      life: 1, decay: opts.decay || 0.02,
      r: opts.r || (Math.random() * 3 + 1),
      color: opts.color || '#EF9F27'
    });
  }

  function drawStars() {
    stars.forEach(s => {
      s.tw += 0.02;
      ctx.beginPath();
      ctx.arc(s.x, s.y - scrollY * 0.08, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${s.a + Math.sin(s.tw) * 0.2})`;
      ctx.fill();
    });
  }

  function drawEarth() {
    const cy = H + 260 - scrollY * 0.35;
    ctx.save();
    ctx.beginPath();
    ctx.arc(W / 2, cy, 300, 0, Math.PI * 2);
    ctx.fillStyle = '#0B3D6B'; ctx.fill();
    ctx.strokeStyle = '#185FA5'; ctx.lineWidth = 3; ctx.stroke();
    [[0.3,0.08,38,16],[0.55,0.12,50,13],[0.7,0.06,32,11]].forEach(([fx,fy,rw,rh]) => {
      ctx.beginPath();
      ctx.ellipse(W/2 - 300 + fx*600, cy - 300 + fy*600, rw, rh, 0, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(100,180,255,0.22)'; ctx.fill();
    });
    const ag = ctx.createRadialGradient(W/2,cy,294,W/2,cy,340);
    ag.addColorStop(0,'rgba(56,138,221,0.45)'); ag.addColorStop(1,'rgba(56,138,221,0)');
    ctx.beginPath(); ctx.arc(W/2,cy,340,0,Math.PI*2);
    ctx.fillStyle = ag; ctx.fill();
    ctx.restore();
  }

  function drawShip(x, y, angle, heat) {
    ctx.save(); ctx.translate(x, y); ctx.rotate(angle);
    if (heat > 0) {
      ctx.beginPath();
      ctx.ellipse(0, 14, 18 + heat*8, 8 + heat*4, 0, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,${Math.floor(120-heat*60)},0,${heat*0.65})`; ctx.fill();
    }
    ctx.beginPath(); ctx.moveTo(0,-26); ctx.lineTo(9,9); ctx.lineTo(5,15); ctx.lineTo(-5,15); ctx.lineTo(-9,9); ctx.closePath();
    ctx.fillStyle = '#B4B2A9'; ctx.fill(); ctx.strokeStyle = '#D3D1C7'; ctx.lineWidth = 1; ctx.stroke();
    [[-1],[1]].forEach(([s]) => {
      ctx.beginPath(); ctx.moveTo(s*9,5); ctx.lineTo(s*20,13); ctx.lineTo(s*18,17); ctx.lineTo(s*7,11); ctx.closePath();
      ctx.fillStyle = '#85B7EB'; ctx.fill();
    });
    ctx.beginPath(); ctx.ellipse(0,-9,5,6,0,0,Math.PI*2); ctx.fillStyle='#B5D4F4'; ctx.fill();
    ctx.restore();
  }

  function drawChute(x, y, open) {
    if (open <= 0) return;
    ctx.save(); ctx.translate(x, y-28); ctx.globalAlpha = open;
    ctx.beginPath(); ctx.arc(0,-18*open,30*open,Math.PI,0);
    ctx.fillStyle='#D4537E'; ctx.fill(); ctx.strokeStyle='#72243E'; ctx.lineWidth=1; ctx.stroke();
    [-28,-12,4,20].forEach(lx => {
      ctx.beginPath(); ctx.moveTo(lx*open,-18*open); ctx.lineTo(0,26);
      ctx.strokeStyle='rgba(114,36,62,0.45)'; ctx.lineWidth=0.7; ctx.stroke();
    });
    ctx.restore(); ctx.globalAlpha=1;
  }

  function drawExplosion(cx, cy, r, prog) {
    [{r:r,c:'#F09595'},{r:r*1.6,c:'#EF9F27'},{r:r*2.3,c:'#E24B4A'}].forEach(({r:er,c}) => {
      ctx.beginPath(); ctx.arc(cx,cy,er,0,Math.PI*2);
      ctx.fillStyle = c.replace('#','rgba(').replace(/(..)(..)(..)/, (_,a,b,cc)=>`${parseInt(a,16)},${parseInt(b,16)},${parseInt(cc,16)},${(1-prog)*0.85})`);
      ctx.fill();
    });
  }

  function drawOcean(oy) {
    ctx.fillStyle='#0B3D6B'; ctx.fillRect(0,oy,W,H-oy);
    for (let wx=0; wx<W; wx+=16) {
      ctx.beginPath(); ctx.moveTo(wx,oy+4); ctx.quadraticCurveTo(wx+8,oy-2,wx+16,oy+4);
      ctx.strokeStyle='rgba(56,138,221,0.45)'; ctx.lineWidth=1.5; ctx.stroke();
    }
  }

  function loop() {
    ctx.clearRect(0,0,W,H);
    const bg = ctx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,'#020818'); bg.addColorStop(1,'#050a1a');
    ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
    drawStars(); drawEarth();
    t++;

    const hud = document.getElementById('anim-hud');

    if (mode === 'success') {
      if (phase===0) {
        hud.textContent = 'ENTRY INTERFACE — REENTRY BURN INITIATED';
        shipVY+=0.025; scrollY+=shipVY*0.5; shipY+=shipVY;
        shipAngle=Math.sin(t*0.04)*0.08; heat=Math.min(heat+0.015,0.9);
        wobble=Math.sin(t*0.15)*2; shipX=W/2+wobble;
        if(heat>0.2) for(let i=0;i<3;i++) spawnP(shipX,shipY+16,{spread:4,vy:-1.5,decay:0.025,color:heat>0.6?'#EF9F27':'#E24B4A',r:Math.random()*4+1});
        if(shipY>H*0.44) phase=1;
      } else if(phase===1) {
        hud.textContent = 'ATMOSPHERIC ENTRY — PLASMA SHEATH FORMING';
        heat=Math.max(heat-0.008,0); shipVY=Math.max(shipVY-0.025,0.55);
        scrollY+=shipVY*0.35; shipY+=shipVY; shipAngle*=0.95;
        parachuteOpen=Math.min(parachuteOpen+0.035,1);
        wobble=Math.sin(t*0.12)*3*parachuteOpen; shipX=W/2+wobble;
        if(heat>0.05) spawnP(shipX,shipY+14,{spread:3,vy:-1,decay:0.03,color:'#EF9F27',r:2});
        if(shipY>H*0.67) phase=2;
      } else if(phase===2) {
        hud.textContent = 'DROGUE DEPLOYED — TERMINAL DESCENT';
        shipVY=Math.max(shipVY-0.018,0.25); scrollY+=shipVY*0.2; shipY+=shipVY;
        wobble=Math.sin(t*0.1)*4; shipX=W/2+wobble;
        if(shipY>H*0.8) phase=3;
      } else if(phase===3) {
        const oy=H*0.85; drawOcean(oy);
        shipVY=Math.max(shipVY-0.012,0.07); shipY+=shipVY;
        wobble=Math.sin(t*0.08)*2; shipX=W/2+wobble;
        hud.textContent='SPLASHDOWN IMMINENT — ALL SYSTEMS NOMINAL';
        if(shipY>=oy-18){
          phase=4;
          for(let i=0;i<60;i++) spawnP(shipX,oy,{spread:8,vy:-4,vyBase:-2,decay:0.028,color:'#85B7EB',r:Math.random()*4+1});
        }
      } else if(phase===4) {
        const oy=H*0.85; drawOcean(oy);
        shipY=Math.min(shipY,oy-10); parachuteOpen=Math.max(parachuteOpen-0.025,0);
        if(!done){ done=true; hud.textContent='SPLASHDOWN CONFIRMED — MISSION SUCCESS'; hud.style.color='#1D9E75'; }
      }
    } else {
      if(phase===0) {
        hud.textContent='ENTRY INTERFACE — ANOMALY DETECTED';
        shipVY+=0.03; scrollY+=shipVY*0.5; shipY+=shipVY;
        shipAngle+=0.007; heat=Math.min(heat+0.022,1);
        wobble=Math.sin(t*0.2)*(3+t*0.05); shipX=W/2+wobble;
        for(let i=0;i<4;i++) spawnP(shipX,shipY+14,{spread:6,vy:-2,decay:0.02,color:heat>0.5?'#E24B4A':'#EF9F27',r:Math.random()*5+2});
        if(shipY>H*0.38||heat>=1) phase=1;
      } else if(phase===1) {
        hud.textContent='CRITICAL — THERMAL SHIELD FAILURE'; hud.style.color='#E24B4A';
        shipVY+=0.055; scrollY+=shipVY*0.4; shipY+=shipVY;
        shipAngle+=0.038; heat=1;
        for(let i=0;i<8;i++) spawnP(shipX+(Math.random()-0.5)*18,shipY+(Math.random()-0.5)*18,{spread:10,vy:-3,vyBase:2,decay:0.015,color:['#E24B4A','#EF9F27','#F09595'][Math.floor(Math.random()*3)],r:Math.random()*6+2});
        if(shipY>H*0.53){ phase=2; explosionR=0; explosionProg=0; }
      } else if(phase===2) {
        hud.textContent='DISINTEGRATION — SIGNAL LOST';
        explosionR=Math.min(explosionR+3.2,110); explosionProg=Math.min(explosionProg+0.011,1);
        drawExplosion(shipX,shipY,explosionR,explosionProg);
        for(let i=0;i<10;i++) spawnP(shipX+(Math.random()-0.5)*explosionR,shipY+(Math.random()-0.5)*explosionR,{spread:12,vy:-3,vyBase:3,decay:0.012,color:['#E24B4A','#EF9F27','#F7C1C1'][Math.floor(Math.random()*3)],r:Math.random()*5+1});
        if(explosionProg>=1) phase=3;
      } else if(phase===3) {
        if(!done){ done=true; hud.textContent='— MISSION FAILED — ALL HANDS LOST —'; hud.style.color='#E24B4A'; }
        for(let i=0;i<2;i++) spawnP(shipX+(Math.random()-0.5)*80,shipY+(Math.random()-0.5)*40,{spread:4,vy:0.5,decay:0.008,color:'#EF9F27',r:Math.random()*3+1});
      }
    }

    if(!(phase===2&&mode==='fail'&&explosionProg>0.5)&&!(phase===3&&mode==='fail')) {
      if(mode==='success') drawChute(shipX,shipY,parachuteOpen);
      drawShip(shipX,shipY,shipAngle,heat);
    }

    particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.life-=p.decay; });
    particles=particles.filter(p=>p.life>0);
    particles.forEach(p=>{
      ctx.save(); ctx.globalAlpha=p.life;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=p.color; ctx.fill(); ctx.restore();
    });

    ctx.font='10px monospace'; ctx.fillStyle='rgba(136,135,128,0.6)';
    ctx.fillText(`T+${String(t).padStart(4,'0')}  ALT ${Math.max(0,Math.floor((1-shipY/H)*180))} km  V ${shipVY.toFixed(1)} km/s`, 12, 18);

    animId = requestAnimationFrame(loop);
  }
</script>
</body> 
</html>
