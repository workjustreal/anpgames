<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>anp Loading</title>
  <style>
    :root {
      --anp-red:      #cc0000;
      --anp-red-dim:  #880000;
      --anp-red-glow: #ff4444;
      --anp-white:    #ffffff;
      --anp-gray:     #333333;
      --anp-muted:    #555555;
    }

    #anp-loading {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0, 0, 0, 0.88);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s ease;
    }

    #anp-loading.hide {
      opacity: 0;
      pointer-events: none;
    }

    #anp-loading::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.12) 2px,
        rgba(0,0,0,0.12) 4px
      );
      pointer-events: none;
      z-index: 0;
    }

    .kl-bg-lines {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .kl-bg-line {
      position: absolute;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--anp-red), transparent);
      opacity: 0;
      animation: klScanH 3.6s ease-in-out infinite;
    }

    .kl-bg-line:nth-child(1) { width: 55%; top: 28%; animation-delay: 0s; }
    .kl-bg-line:nth-child(2) { width: 35%; top: 58%; animation-delay: 1.3s; }
    .kl-bg-line:nth-child(3) { width: 70%; top: 72%; animation-delay: 2.4s; }

    @keyframes klScanH {
      0%   { opacity: 0; transform: translateX(-110%); }
      40%  { opacity: 0.5; }
      100% { opacity: 0; transform: translateX(110%); }
    }

    .kl-loader {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
    }

    .kl-logo-wrap {
      position: relative;
      width: 180px;
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 36px;
    }

    .kl-ring {
      position: absolute;
      border-radius: 6px;
      border: 2px solid transparent;
      animation: klRing 2.6s ease-in-out infinite;
    }

    .kl-ring-1 {
      width: 148px; height: 148px;
      border-top-color:   var(--anp-red);
      border-right-color: var(--anp-red);
      animation-delay: 0s;
    }

    .kl-ring-2 {
      width: 170px; height: 170px;
      border-bottom-color: var(--anp-red-dim);
      border-left-color:   var(--anp-red-dim);
      animation-delay: 0.35s;
    }

    .kl-ring-3 {
      width: 194px; height: 194px;
      border-top-color:   rgba(204,0,0,0.35);
      border-right-color: rgba(204,0,0,0.35);
      animation-delay: 0.7s;
    }

    @keyframes klRing {
      0%   { opacity: 0; transform: scale(0.55) rotate(0deg); }
      25%  { opacity: 1; }
      75%  { opacity: 0.5; }
      100% { opacity: 0; transform: scale(1.08) rotate(90deg); }
    }

    .kl-corner {
      position: absolute;
      width: 22px;
      height: 22px;
      animation: klCorner 2.6s ease-in-out infinite;
    }

    .kl-corner-tl { top: 0; left: 0;     border-top:    2px solid var(--anp-red); border-left:   2px solid var(--anp-red); }
    .kl-corner-tr { top: 0; right: 0;    border-top:    2px solid var(--anp-red); border-right:  2px solid var(--anp-red); }
    .kl-corner-bl { bottom: 0; left: 0;  border-bottom: 2px solid var(--anp-red); border-left:   2px solid var(--anp-red); }
    .kl-corner-br { bottom: 0; right: 0; border-bottom: 2px solid var(--anp-red); border-right:  2px solid var(--anp-red); }

    @keyframes klCorner {
      0%, 100% { opacity: 0.25; }
      50%       { opacity: 1; }
    }

    .kl-logo-img {
      width: 108px;
      height: 108px;
      object-fit: contain;
      position: relative;
      z-index: 10;
      animation: klLogo 2.6s ease-in-out infinite;
    }

    @keyframes klLogo {
      0%   { opacity: 0; transform: scale(0.82); }
      18%  { opacity: 1; transform: scale(1.04); }
      50%  { transform: scale(1); }
      85%  { opacity: 1; }
      100% { opacity: 0; transform: scale(0.94); }
    }

    .kl-brand {
      display: flex;
      letter-spacing: 12px;
      margin-bottom: 32px;
    }

    .kl-brand span {
      font-size: 28px;
      font-weight: 800;
      color: var(--anp-white);
      display: inline-block;
      text-transform: uppercase;
      animation: klLetter 2.6s ease-in-out infinite;
      -webkit-text-stroke: 1.5px var(--anp-red);
      text-stroke: 1.5px var(--anp-red);
      paint-order: stroke fill;
    }

    .kl-brand span:nth-child(1) { animation-delay: 0.04s; }
    .kl-brand span:nth-child(2) { animation-delay: 0.09s; }
    .kl-brand span:nth-child(3) { animation-delay: 0.14s; }
    .kl-brand span:nth-child(4) { animation-delay: 0.19s; }
    .kl-brand span:nth-child(5) { animation-delay: 0.24s; }

    @keyframes klLetter {
      0%   { opacity: 0; transform: translateY(-14px); }
      28%  { opacity: 1; transform: translateY(0); }
      72%  { opacity: 1; }
      92%  { opacity: 0; transform: translateY(10px); }
      100% { opacity: 0; }
    }

    .kl-progress-track {
      width: 220px;
      height: 3px;
      background: var(--anp-gray);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 16px;
      position: relative;
    }

    .kl-progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--anp-red-dim), var(--anp-red), var(--anp-red-glow));
      border-radius: 2px;
      animation: klProgress 2.6s ease-in-out infinite;
      position: relative;
    }

    .kl-progress-bar::after {
      content: '';
      position: absolute;
      right: -1px;
      top: -3px;
      width: 8px;
      height: 9px;
      background: var(--anp-red-glow);
      border-radius: 50%;
      filter: blur(3px);
    }

    @keyframes klProgress {
      0%   { width: 0%; opacity: 1; }
      78%  { width: 100%; opacity: 1; }
      100% { width: 100%; opacity: 0; }
    }

    .kl-dots {
      display: flex;
      gap: 7px;
      margin-bottom: 10px;
    }

    .kl-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--anp-red);
      animation: klDot 1.2s ease-in-out infinite;
    }

    .kl-dot:nth-child(1) { animation-delay: 0s; }
    .kl-dot:nth-child(2) { animation-delay: 0.2s; }
    .kl-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes klDot {
      0%, 100% { opacity: 0.2; transform: scale(0.7); }
      50%       { opacity: 1;   transform: scale(1.3); }
    }

    .kl-status {
      font-size: 11px;
      color: var(--anp-muted);
      letter-spacing: 3px;
      text-transform: uppercase;
      animation: klStatus 2.6s ease-in-out infinite;
    }

    @keyframes klStatus {
      0%   { opacity: 0; }
      18%  { opacity: 1; }
      80%  { opacity: 0.6; }
      100% { opacity: 0; }
    }

    .kl-particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .kl-particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: var(--anp-red);
      border-radius: 50%;
      opacity: 0;
      animation: klFloat linear infinite;
    }

    @keyframes klFloat {
      0%   { opacity: 0; transform: translateY(0) scale(0); }
      15%  { opacity: 0.7; transform: translateY(-20px) scale(1); }
      80%  { opacity: 0.15; }
      100% { opacity: 0; transform: translateY(-120px) scale(0); }
    }
  </style>
</head>
<body>

<div id="anp-loading">
  <div class="kl-bg-lines">
    <div class="kl-bg-line"></div>
    <div class="kl-bg-line"></div>
    <div class="kl-bg-line"></div>
  </div>

  <div class="kl-particles" id="kl-particles"></div>

  <div class="kl-loader">
    <div class="kl-logo-wrap">
      <div class="kl-ring kl-ring-1"></div>
      <div class="kl-ring kl-ring-2"></div>
      <div class="kl-ring kl-ring-3"></div>
      <div class="kl-corner kl-corner-tl"></div>
      <div class="kl-corner kl-corner-tr"></div>
      <div class="kl-corner kl-corner-bl"></div>
      <div class="kl-corner kl-corner-br"></div>
      <!-- แทนที่ src ด้วย path รูปโลโก้จริง -->
      <img class="kl-logo-img" src="assets/images/anp.jpg" alt="anp Logo" />
    </div>

    <div class="kl-brand">
      <span>A</span><span>N</span><span>P</span>
    </div>

    <div class="kl-progress-track">
      <div class="kl-progress-bar"></div>
    </div>

    <div class="kl-dots">
      <div class="kl-dot"></div>
      <div class="kl-dot"></div>
      <div class="kl-dot"></div>
    </div>

    <div class="kl-status" id="kl-status">Initializing...</div>
  </div>
</div>

<script>
  const klMessages = ['Initializing...', 'Loading assets...', 'Almost ready...', 'Welcome'];
  let klIdx = 0;
  const klStatusEl = document.getElementById('kl-status');
  const klInterval = setInterval(() => {
    klIdx = (klIdx + 1) % klMessages.length;
    klStatusEl.textContent = klMessages[klIdx];
  }, 2600);

  const klWrap = document.getElementById('kl-particles');
  for (let n = 0; n < 14; n++) {
    const p = document.createElement('div');
    p.className = 'kl-particle';
    p.style.left              = (15 + Math.random() * 70) + '%';
    p.style.bottom            = (5  + Math.random() * 40) + '%';
    p.style.animationDelay    = (Math.random() * 5) + 's';
    p.style.animationDuration = (3  + Math.random() * 3) + 's';
    klWrap.appendChild(p);
  }
</script>

</body>
</html>
